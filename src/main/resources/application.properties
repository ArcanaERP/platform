spring.application.name=platform
spring.datasource.url=jdbc:h2:mem:arcanaerp;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false
arcanaerp.inventory.reversal-idempotency.pending-claim-ttl=PT5M
management.endpoints.web.exposure.include=health,info
management.endpoints.web.discovery.enabled=false
management.info.env.enabled=true
info.app.name=ArcanaERP Platform
info.app.module=platform
